<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#14121F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LEARN Thai">
<title>LEARN Thai — Travel Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Noto+Sans+Thai:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14121F;
    --card: #201C33;
    --card-back: #26203D;
    --edge: #3A3159;
    --gold: #FFC64D;
    --pink: #FF5CA8;
    --mint: #5CE8B5;
    --text: #F7F2E7;
    --dim: #B5ABD6;
    --radius: 22px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    touch-action: manipulation;
  }
  .thai { font-family: 'Noto Sans Thai', sans-serif; }

  /* ================= HOME ================= */
  #home {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 22px 16px calc(30px + env(safe-area-inset-bottom));
  }
  .brand {
    font-weight: 900;
    font-size: 2.1rem;
    line-height: 1.05;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  .brand span { color: var(--gold); }
  .brand-sub { color: var(--pink); font-weight: 700; font-size: 1.05rem; margin-top: 4px; }
  .brand-thai { color: var(--dim); font-weight: 600; font-size: 1rem; margin-top: 2px; }
  .home-stat {
    margin: 16px 0 8px;
    background: var(--card);
    border: 2px solid var(--edge);
    border-radius: 18px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 800;
    font-size: 1.05rem;
  }
  .home-stat b { color: var(--gold); font-size: 1.3rem; }
  .section-label {
    margin: 20px 4px 10px;
    font-size: 0.82rem;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .tile-all {
    width: 100%;
    background: linear-gradient(135deg, #2A2344, #201C33);
    border: 2px solid var(--gold);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    text-align: left;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }
  .tile-all .t-emoji { font-size: 1.9rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile {
    background: var(--card);
    border: 2px solid var(--edge);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    text-align: left;
    padding: 16px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 112px;
  }
  .tile:active, .tile-all:active { transform: scale(0.97); }
  .t-emoji { font-size: 1.7rem; line-height: 1; }
  .t-name { font-weight: 900; font-size: 1.02rem; line-height: 1.15; }
  .t-count { font-weight: 700; font-size: 0.85rem; color: var(--dim); margin-top: auto; }
  .t-count b { color: var(--mint); }
  .tile.done-tile { border-color: var(--mint); }
  .row-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 2px solid var(--edge);
    border-radius: 16px;
    padding: 16px 15px;
    margin-bottom: 10px;
    color: var(--text);
    font-family: inherit;
    font-weight: 900;
    font-size: 1.1rem;
    text-align: left;
    cursor: pointer;
    line-height: 1.2;
  }
  .row-btn:active { transform: scale(0.98); }
  .row-btn .r-emoji { font-size: 1.5rem; }
  .row-btn .r-count { margin-left: auto; color: var(--dim); font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
  .row-btn .r-sub { display: block; color: var(--dim); font-weight: 700; font-size: 0.88rem; margin-top: 3px; }
  .row-btn.gold-row { border-color: var(--gold); }

  /* ================= STUDY ================= */
  #study { display: none; flex-direction: column; flex: 1; min-height: 0; }
  header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 12px; }
  .icon-btn {
    background: var(--card);
    border: 2px solid var(--edge);
    color: var(--text);
    font-size: 1.15rem;
    min-width: 44px; height: 44px;
    border-radius: 14px;
    display: grid; place-items: center;
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
  }
  .icon-btn:active { transform: scale(0.93); }
  .deck-title {
    font-weight: 900;
    font-size: 1.12rem;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    flex: 1;
  }
  .deck-title span { color: var(--gold); }

  .progress-wrap { padding: 0 16px; }
  .progress-bar { height: 8px; background: var(--card); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    border-radius: 99px;
    transition: width 0.35s ease;
  }
  .progress-label {
    margin-top: 7px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--dim);
    display: flex; justify-content: space-between;
  }
  .progress-label b { color: var(--text); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px;
    perspective: 1200px;
    min-height: 0;
  }
  .card {
    width: 100%; max-width: 420px;
    height: 100%; max-height: 480px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.3, 0.9, 0.4, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    border: 2px solid var(--edge);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 30px 20px;
    gap: 13px;
    overflow: hidden;
  }
  .face.front { background: var(--card); }
  .face.back { background: var(--card-back); transform: rotateY(180deg); border-color: var(--pink); }
  .face-tag {
    position: absolute; top: 16px;
    font-size: 0.78rem; font-weight: 900;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim);
  }
  .script {
    color: var(--gold);
    font-weight: 800;
    font-size: clamp(2rem, 9.5vw, 3.2rem);
    line-height: 1.3;
  }
  .roman {
    font-weight: 900;
    font-size: clamp(1.35rem, 6.2vw, 1.9rem);
    line-height: 1.2;
  }
  .phon {
    color: var(--pink);
    font-weight: 700;
    font-size: clamp(1rem, 4.4vw, 1.25rem);
    letter-spacing: 0.03em;
  }
  .phon::before { content: "🔊 "; font-size: 0.9em; }
  .english {
    font-weight: 900;
    font-size: clamp(1.6rem, 7vw, 2.3rem);
    line-height: 1.2;
  }
  .note {
    color: var(--dim);
    font-weight: 700;
    font-size: clamp(0.95rem, 4vw, 1.1rem);
    line-height: 1.35;
    max-width: 92%;
  }
  .words {
    color: var(--mint);
    font-weight: 700;
    font-size: clamp(1rem, 4.2vw, 1.15rem);
    line-height: 1.4;
    max-width: 94%;
  }
  .words:empty, .note:empty { display: none; }
  .l-words { color: var(--mint); font-weight: 700; font-size: 1rem; margin-top: 5px; line-height: 1.4; }

  /* scenario dialogue bubbles */
  .bub {
    border: 2px solid var(--edge);
    border-radius: 18px;
    padding: 14px 15px;
    margin-bottom: 12px;
    background: var(--card);
  }
  .bub.you { background: #2A2344; border-color: var(--gold); margin-left: 12%; }
  .bub.them { margin-right: 12%; }
  .b-who {
    font-size: 0.8rem;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 6px;
  }
  .bub.you .b-who { color: var(--gold); }
  .b-script { font-family: 'Noto Sans Thai', sans-serif; color: var(--gold); font-weight: 800; font-size: 1.6rem; line-height: 1.35; }
  .b-roman { font-weight: 900; font-size: 1.15rem; margin-top: 2px; }
  .b-phon { color: var(--pink); font-weight: 700; font-size: 1.02rem; margin-top: 1px; }
  .b-en { font-weight: 700; font-size: 1.08rem; margin-top: 5px; }
  .b-words { color: var(--mint); font-weight: 700; font-size: 0.98rem; margin-top: 4px; line-height: 1.4; }
  .hint {
    position: absolute; bottom: 14px;
    font-size: 0.85rem; font-weight: 700; color: var(--dim);
  }

  footer {
    padding: 8px 16px calc(16px + env(safe-area-inset-bottom));
    display: flex; gap: 12px;
  }
  .ctl {
    flex: 1;
    border: none;
    border-radius: 18px;
    font-family: inherit;
    font-weight: 900;
    font-size: 1.15rem;
    padding: 18px 8px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .ctl:active { transform: scale(0.96); }
  .ctl.again { background: var(--card); color: var(--pink); border: 2px solid var(--pink); }
  .ctl.got { background: var(--mint); color: #032216; }

  .done { display: none; flex-direction: column; align-items: center; gap: 18px; text-align: center; }
  .done .script { font-size: 2.5rem; }
  .done h2 { font-size: 1.9rem; font-weight: 900; }
  .done p { color: var(--dim); font-weight: 700; font-size: 1.05rem; }
  .ctl.restart { background: var(--gold); color: #1A1500; padding: 18px 34px; flex: 0; }

  /* ================= LIST VIEW ================= */
  #list {
    display: none;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 16px calc(30px + env(safe-area-inset-bottom));
  }
  .list-head {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--bg);
    padding: 14px 0 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lrow {
    background: var(--card);
    border: 2px solid var(--edge);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .l-script { font-family: 'Noto Sans Thai', sans-serif; color: var(--gold); font-weight: 800; font-size: 1.65rem; line-height: 1.35; }
  .l-roman { font-weight: 900; font-size: 1.18rem; margin-top: 2px; }
  .l-phon { color: var(--pink); font-weight: 700; font-size: 1.05rem; margin-top: 1px; }
  .l-en { font-weight: 700; font-size: 1.1rem; margin-top: 5px; }
  .l-note { color: var(--dim); font-weight: 600; font-size: 0.95rem; margin-top: 4px; line-height: 1.35; }
  .lsec {
    margin: 24px 4px 8px;
    font-size: 0.84rem;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pink);
  }
  .lsub { color: var(--dim); font-weight: 700; font-size: 0.92rem; line-height: 1.4; margin: 0 4px 10px; }
  .numbox {
    background: var(--card);
    border: 2px solid var(--edge);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .numline {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 9px 12px;
    border-bottom: 1px solid var(--edge);
    font-weight: 700;
    font-size: 1.08rem;
  }
  .numline:last-child { border-bottom: none; }
  .n-a { min-width: 56px; font-weight: 900; color: var(--text); }
  .n-d { min-width: 60px; color: var(--mint); font-family: 'Noto Sans Thai', sans-serif; font-weight: 800; }
  .n-t { flex: 1; color: var(--gold); font-family: 'Noto Sans Thai', sans-serif; font-weight: 800; }
  .n-r { color: var(--pink); text-align: right; font-size: 1rem; max-width: 46%; }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
    .progress-fill { transition: none; }
  }
</style>
</head>
<body>

<!-- ================= HOME / NAVIGATION ================= -->
<div id="home">
  <div class="brand">Learn <span>Thai</span></div>
  <div class="brand-sub">Travel Flashcards</div>
  <div class="brand-thai thai">เรียนภาษาไทย · rian phasa thai</div>

  <div class="home-stat">
    <span>Cards learned</span>
    <b id="homeStat">0 / 0</b>
  </div>

  <div class="section-label">🎴 Flashcards — drill</div>
  <button class="tile-all" id="allTile">
    <span class="t-emoji">🇹🇭</span>
    <span>
      <span class="t-name">All Cards</span><br>
      <span class="t-count" id="allCount"></span>
    </span>
  </button>
  <div style="height:12px"></div>
  <div class="grid" id="catGrid"></div>

  <div class="section-label">📖 Phrasebook — read</div>
  <div id="bookList"></div>

  <div class="section-label">🎬 Scenarios — role-play</div>
  <div id="scenarioList"></div>

  <div class="section-label">📋 Reference lists</div>
  <div id="refList"></div>
</div>

<!-- ================= STUDY VIEW ================= -->
<div id="study">
  <header>
    <button class="icon-btn" id="backBtn">←</button>
    <div class="deck-title" id="deckTitle"></div>
    <button class="icon-btn" id="dirBtn" title="Swap front/back">⇄</button>
    <button class="icon-btn" id="shuffleBtn" title="Shuffle">🔀</button>
    <button class="icon-btn" id="listBtn" title="List view">☰</button>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label">
      <span><b id="learnedCount">0</b> learned</span>
      <span><b id="remainCount">0</b> to go</span>
    </div>
  </div>

  <main>
    <div class="card" id="card">
      <div class="face front">
        <div class="face-tag" id="frontTag">Thai</div>
        <div class="script thai" id="cScript"></div>
        <div class="roman" id="cRoman"></div>
        <div class="phon" id="cPhon"></div>
        <div class="hint">tap to flip</div>
      </div>
      <div class="face back">
        <div class="face-tag" id="backTag">English</div>
        <div class="english" id="cEnglish"></div>
        <div class="words" id="cWords"></div>
        <div class="note" id="cNote"></div>
        <div class="hint">tap to flip back</div>
      </div>
    </div>

    <div class="done" id="doneScreen">
      <div class="script thai">เก่งมาก!</div>
      <h2>Deck complete</h2>
      <p>geng mak — very good!</p>
      <button class="ctl restart" id="restartBtn">Study again</button>
    </div>
  </main>

  <!-- Got it on the LEFT: this app is held left-handed. No rightie hegemony here. -->
  <footer id="controls">
    <button class="ctl got" id="gotBtn">✓ Got it</button>
    <button class="ctl again" id="againBtn">↻ Again</button>
  </footer>
</div>

<!-- ================= LIST VIEW ================= -->
<div id="list">
  <header class="list-head">
    <button class="icon-btn" id="listBackBtn">←</button>
    <div class="deck-title" id="listTitle"></div>
  </header>
  <div id="listContent"></div>
</div>

<script>
/* =====================================================================
   LEARN THAI — TRAVEL FLASHCARDS
   ---------------------------------------------------------------------
   ADDING CARDS: each card is one object:
   { en:"English", roman:"anglicized", script:"ไทย", phon:"spelled-out",
     cats:["basics","market"],          // one or more category keys
     note:"optional context / vibe / warning shown on the English side" }

   Categories overlap on purpose — redundancy is how it sticks.
   ⚠ marks slang from the Gemini-translated YouTube docs: verify with locals.
   ===================================================================== */

const CATEGORIES = {
  basics:    { name:"Basics",                 emoji:"🙏" },
  numbers:   { name:"Numbers",                emoji:"🔢" },
  learning:  { name:"Learning Thai",          emoji:"🧠" },
  airport:   { name:"Airport & Immigration",  emoji:"🛬" },
  money:     { name:"Money & Paying",         emoji:"💸" },
  bargain:   { name:"Negotiating Price",      emoji:"🤝" },
  time:      { name:"Time & Schedules",       emoji:"⏰" },
  taxi:      { name:"Taxi & Scooter",         emoji:"🛵" },
  cafe:      { name:"Cafe",                   emoji:"☕" },
  market:    { name:"Market & Street Food",   emoji:"🍢" },
  restaurant:{ name:"Restaurant",             emoji:"🍜" },
  food:      { name:"Food & Drink",           emoji:"🥭" },
  meeting:   { name:"Meeting People",         emoji:"👋" },
  friends:   { name:"Friends & Compliments",  emoji:"😄" },
  flirt:     { name:"Talking to Cute Girls",  emoji:"😍" },
  nightlife: { name:"Nightlife & Party",      emoji:"🌃" },
  slang:     { name:"Slang & Jokes",          emoji:"🤪" },
  help:      { name:"Help & Emergency",       emoji:"🆘" },
  sick:      { name:"Sick & Pharmacy",        emoji:"🤒" },
  police:    { name:"Police & Authorities",   emoji:"👮" },
  sorry:     { name:"Sorry & De-escalation",  emoji:"🕊️" },
  sights:    { name:"Temples & Museums",      emoji:"🛕" },
  nature:    { name:"Nature & Activities",    emoji:"🏝️" },
  people:    { name:"People & Family",        emoji:"👪" }
};

const CARDS = [
/* ---------------- BASICS ---------------- */
{ en:"Hello", roman:"sawatdee (krap/ka)", script:"สวัสดี", phon:"sah-wah-DEE (krap / kah)", words:"sawat = goodness/blessing · dee = good", cats:["basics","meeting"], note:"Men end with krap, women with ka — on almost every sentence." },
{ en:"Polite ending particle", roman:"krap / ka", script:"ครับ / ค่ะ", phon:"KRAP (men) / KAH (women)", words:"krap (men) / ka (women) — bolt onto the end of nearly every sentence", cats:["basics","police","meeting"], note:"The politeness engine of Thai. When in doubt, add it." },
{ en:"Thank you", roman:"khop khun", script:"ขอบคุณ", phon:"kop-KOON", words:"khop = to thank · khun = you", cats:["basics","meeting","cafe","restaurant"] },
{ en:"Yes / that's right", roman:"chai", script:"ใช่", phon:"CHY", words:"chai = yes / correct / it is so", cats:["basics"] },
{ en:"No / not right", roman:"mai chai", script:"ไม่ใช่", phon:"my-CHY", words:"mai = not · chai = right → 'not right'", cats:["basics"] },
{ en:"No problem / it's okay", roman:"mai pen rai", script:"ไม่เป็นไร", phon:"my pen RY", words:"mai = not · pen = to be · rai = anything → 'it is nothing'", cats:["basics","sorry","slang"], note:"The national motto. Also a graceful way to refuse: 'I'm good.'" },
{ en:"Excuse me / sorry", roman:"khor thot", script:"ขอโทษ", phon:"kor-TOTE", words:"khor = ask for · thot = blame/punishment → 'I ask forgiveness'", cats:["basics","sorry","police"] },
{ en:"What's that? / say that again?", roman:"arai na (krap)", script:"อะไรนะ", phon:"ah-RY NAH (krap)", words:"arai = what · na = softening particle", cats:["basics","learning"], note:"Your #1 tool for keeping a conversation alive." },
{ en:"I don't understand", roman:"mai khao jai", script:"ไม่เข้าใจ", phon:"my kow-JY", words:"mai = not · khao = enter · jai = heart/mind → 'doesn't enter my heart'", cats:["basics","learning","police"] },
{ en:"I don't know", roman:"mai roo", script:"ไม่รู้", phon:"my-ROO", words:"mai = not · roo = to know", cats:["basics","slang"] },
{ en:"Can you speak English?", roman:"phut phasa angkrit dai mai?", script:"พูดภาษาอังกฤษได้ไหม", phon:"POOT pah-SAH ang-KRIT dy-MY", words:"phut = speak · phasa = language · angkrit = English · dai mai = can you?", cats:["basics","learning","police","help"] },
{ en:"Where is the bathroom?", roman:"hong nam yoo tee nai?", script:"ห้องน้ำอยู่ที่ไหน", phon:"hong-NAHM yoo tee-NY", words:"hong = room · nam = water · yoo = is located · tee nai = where → 'water room is where?'", cats:["basics","restaurant","market"] },
{ en:"How much?", roman:"tao rai?", script:"เท่าไหร่", phon:"tao-RY", words:"tao = amount · rai = how much/what", cats:["basics","money","bargain","market"] },
{ en:"What is this?", roman:"nee kue arai?", script:"นี่คืออะไร", phon:"nee-KOO-ah-RY", words:"nee = this · kue = is · arai = what", cats:["basics","market","food"], note:"Marked 'Important!' in your phrasebook — the street-food superpower." },
{ en:"Please give me... (+ noi)", roman:"khor ... noi (krap/ka)", script:"ขอ...หน่อย", phon:"KOR ... NOY", words:"khor = request · noi = a little (softens any ask)", cats:["basics","restaurant","cafe"], note:"Universal polite request pattern. khor nam noi = water please." },
{ en:"Water, please", roman:"khor nam noi", script:"ขอน้ำหน่อย", phon:"kor-NAHM-noy", words:"khor = please give · nam = water · noi = softener", cats:["basics","restaurant","food"] },

/* =====================================================================
   ENGINE
   ===================================================================== */
const $ = id => document.getElementById(id);

// stable id per card
CARDS.forEach(c => c.id = c.script + "|" + c.en.slice(0, 24));

// persisted learned set (works on GitHub Pages; safely session-only elsewhere)
let learnedSet = new Set();
function loadLearned() {
  try {
    const raw = localStorage.getItem("learnThai.learned");
    if (raw) learnedSet = new Set(JSON.parse(raw));
  } catch (e) { /* storage unavailable */ }
}
function saveLearned() {
  try { localStorage.setItem("learnThai.learned", JSON.stringify([...learnedSet])); }
  catch (e) { /* ignore */ }
}

function cardsFor(catKey) {
  return catKey === "all" ? CARDS : CARDS.filter(c => c.cats.includes(catKey));
}
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------------- home ---------------- */
function renderHome() {
  $("homeStat").textContent = learnedSet.size + " / " + CARDS.length;
  $("allCount").innerHTML = "<b>" + learnedSet.size + "</b> / " + CARDS.length + " learned";
  const grid = $("catGrid");
  grid.innerHTML = "";
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const cards = cardsFor(key);
    const learned = cards.filter(c => learnedSet.has(c.id)).length;
    const tile = document.createElement("button");
    tile.className = "tile" + (cards.length && learned === cards.length ? " done-tile" : "");
    tile.innerHTML =
      '<span class="t-emoji">' + cat.emoji + '</span>' +
      '<span class="t-name">' + cat.name + '</span>' +
      '<span class="t-count"><b>' + learned + '</b> / ' + cards.length + '</span>';
    tile.addEventListener("click", () => openDeck(key));
    grid.appendChild(tile);
  });

  // Phrasebook rows — one tap, read the category like a book
  const mkRow = (emoji, label, sub, count, onTap, gold) => {
    const b = document.createElement("button");
    b.className = "row-btn" + (gold ? " gold-row" : "");
    b.innerHTML = '<span class="r-emoji">' + emoji + '</span><span>' + label +
      (sub ? '<span class="r-sub">' + sub + '</span>' : '') + '</span>' +
      (count ? '<span class="r-count">' + count + '</span>' : '');
    b.addEventListener("click", onTap);
    return b;
  };
  const book = $("bookList");
  book.innerHTML = "";
  book.appendChild(mkRow("🇹🇭", "Complete Phrasebook", "every chapter, front to back", CARDS.length + " cards", () => openListFromHome("all"), true));
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    book.appendChild(mkRow(cat.emoji, cat.name, "", cardsFor(key).length + "", () => openListFromHome(key)));
  });

  // Scenario rows — role-play dialogues
  const scen = $("scenarioList");
  scen.innerHTML = "";
  Object.entries(SCENARIOS).forEach(([key, s]) => {
    scen.appendChild(mkRow(s.emoji, s.name, s.sub, "", () => renderScenario(key)));
  });

  // Reference list rows — the deep tables
  const ref = $("refList");
  ref.innerHTML = "";
  Object.entries(REFS).forEach(([key, r]) => {
    ref.appendChild(mkRow(r.emoji, r.name, r.sub, "", () => renderRef(key)));
  });
}

/* ---------------- study ---------------- */
let currentCat = null;
let queue = [];
let sessionTotal = 0;
let reversed = false;
const card = $("card");

function openDeck(catKey) {
  currentCat = catKey;
  const catName = catKey === "all" ? "All Cards" : CATEGORIES[catKey].name;
  const parts = catName.split(" ");
  $("deckTitle").innerHTML = parts[0] + " <span>" + parts.slice(1).join(" ") + "</span>";
  $("home").style.display = "none";
  $("study").style.display = "flex";
  startSession(false);
}

function startSession(resetLearned) {
  const all = cardsFor(currentCat);
  if (resetLearned) {
    all.forEach(c => learnedSet.delete(c.id));
    saveLearned();
  }
  queue = shuffle(all.filter(c => !learnedSet.has(c.id)));
  sessionTotal = all.length;
  if (queue.length === 0 && all.length > 0) { finishDeck(); updateProgress(); return; }
  $("doneScreen").style.display = "none";
  card.style.display = "";
  $("controls").style.visibility = "visible";
  showCurrent();
  updateProgress();
}

function showCurrent() {
  card.classList.remove("flipped");
  const c = queue[0];
  if (!c) return;
  if (!reversed) {
    $("frontTag").textContent = "Thai";
    $("backTag").textContent = "English";
    $("cScript").textContent = c.script;
    $("cRoman").textContent = c.roman;
    $("cPhon").textContent = c.phon;
    $("cEnglish").textContent = c.en;
    $("cWords").textContent = c.words ? "🧩 " + c.words : "";
    $("cNote").textContent = c.note || "";
  } else {
    $("frontTag").textContent = "English";
    $("backTag").textContent = "Thai";
    $("cScript").textContent = "";
    $("cRoman").textContent = c.en;
    $("cPhon").textContent = "";
    $("cEnglish").innerHTML =
      '<span class="script thai" style="display:block;font-size:1.05em;color:var(--gold);margin-bottom:6px">' + c.script + '</span>' +
      '<span style="font-size:0.75em">' + c.roman + '</span>' +
      '<div class="phon" style="margin-top:10px;font-size:0.55em">' + c.phon + '</div>';
    $("cWords").textContent = c.words ? "🧩 " + c.words : "";
    $("cNote").textContent = c.note || "";
  }
}

function updateProgress() {
  const learned = sessionTotal - queue.length;
  $("learnedCount").textContent = learned;
  $("remainCount").textContent = queue.length;
  $("progressFill").style.width = sessionTotal ? (learned / sessionTotal * 100) + "%" : "0%";
}

function finishDeck() {
  card.style.display = "none";
  $("controls").style.visibility = "hidden";
  $("doneScreen").style.display = "flex";
}

/* ---------------- list view ---------------- */
const ND = ["suun","neung","saawng","saam","sii","haa","hok","jet","bpaet","gao"];
const NT = ["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];
const TDG = ["๐","๑","๒","๓","๔","๕","๖","๗","๘","๙"];
const tdg = n => String(n).split("").map(d => TDG[+d]).join("");

// Thai number words for 0–100 (handles sip-ET and YII-sip irregularities)
function numWord(n) {
  if (n === 0) return { r:"suun", t:"ศูนย์" };
  if (n === 100) return { r:"neung roi", t:"หนึ่งร้อย" };
  const tens = Math.floor(n / 10), ones = n % 10;
  let r = "", t = "";
  if (tens === 1) { r = "sip"; t = "สิบ"; }
  else if (tens === 2) { r = "yii-sip"; t = "ยี่สิบ"; }
  else if (tens >= 3) { r = ND[tens] + "-sip"; t = NT[tens] + "สิบ"; }
  if (ones) {
    if (tens && ones === 1) { r += "-et"; t += "เอ็ด"; }
    else { r += (r ? "-" : "") + ND[ones]; t += NT[ones]; }
  }
  return { r, t };
}

const numLine = (a, d, t, r) =>
  '<div class="numline"><span class="n-a">' + a + '</span><span class="n-d thai">' + d +
  '</span><span class="n-t thai">' + t + '</span><span class="n-r">' + r + '</span></div>';
const lsec = (title, sub) =>
  '<div class="lsec">' + title + '</div>' + (sub ? '<div class="lsub">' + sub + '</div>' : '');
const nbox = inner => '<div class="numbox">' + inner + '</div>';

function refCore() {
  let h = "", b = "";

  h += lsec("Building blocks: 0–10", "The whole system is these eleven pieces snapped together like Lego.");
  b = "";
  for (let i = 0; i <= 9; i++) b += numLine(i, tdg(i), NT[i], ND[i]);
  b += numLine(10, tdg(10), "สิบ", "sip");
  h += nbox(b);

  h += lsec("11 – 20", "Teens = sip + digit. Two traps: 11 ends in ET (not neung), and 20 is YII-sip (not saawng-sip).");
  b = "";
  for (let i = 11; i <= 20; i++) { const w = numWord(i); b += numLine(i, tdg(i), w.t, w.r); }
  h += nbox(b);

  h += lsec("Tens: 10 – 90", "digit + sip. Only 20 breaks the pattern.");
  b = "";
  for (let i = 10; i <= 90; i += 10) { const w = numWord(i); b += numLine(i, tdg(i), w.t, w.r); }
  h += nbox(b);
  return h;
}

function refThousands() {
  let h = "", b = "";
  h += lsec("Hundreds", "digit + roi.");
  b = "";
  for (let i = 1; i <= 9; i++) b += numLine(i * 100, tdg(i * 100), NT[i] + "ร้อย", ND[i] + "-roi");
  h += nbox(b);

  h += lsec("Thousands & the big leagues", "digit + phan. Past that, each new size gets its own word — no 'ten thousand', just meun.");
  b = "";
  for (let i = 1; i <= 9; i++) b += numLine(i * 1000, tdg(i * 1000), NT[i] + "พัน", ND[i] + "-phan");
  b += numLine("10,000", tdg(10000), "หมื่น", "meun");
  b += numLine("100,000", tdg(100000), "แสน", "saen");
  b += numLine("1 million", "", "ล้าน", "laan");
  h += nbox(b);
  h += '<div class="lsub">Grandma-movie flex: 10 million = sip laan. Combine like Lego: 16,000 = neung meun hok phan.</div>';
  return h;
}

function refFullRun() {
  let h = "", b = "";
  h += lsec("The full run: 1 – 100", "Every single one. Read ten a day, out loud, on the toilet, whatever — redundancy is the point.");
  b = "";
  for (let i = 1; i <= 100; i++) { const w = numWord(i); b += numLine(i, tdg(i), w.t, w.r); }
  h += nbox(b);
  return h;
}

function refBaht() {
  let h = "", b = "";

  b = "";
  b += numLine("฿1", tdg(1), "หนึ่งบาท", "neung baht · small silver coin");
  b += numLine("฿2", tdg(2), "สองบาท", "saawng baht · gold-tone coin");

  b += numLine("฿50", tdg(50), "ห้าสิบบาท", "haa-sip baht · BLUE note");

}

function refTime() {
  let h = "", b = "";
  h += lsec("Telling time", "Thai runs a 6-hour clock: the day splits into four chunks, each with its own word, and the count restarts. Feels alien for a week, then it clicks like a combination lock.");
  b = "";
  b += numLine("1 AM", "ตี", "ตีหนึ่ง", "dtee neung");
  b += numLine("3 AM", "ตี", "ตีสาม", "dtee saam · dtee covers 1–5 AM");
  b += numLine("6 AM", "เช้า", "หกโมงเช้า", "hok mong chao");
  b += numLine("9 AM", "เช้า", "เก้าโมงเช้า", "gao mong chao · morning hours");
  b += numLine("Noon", "เที่ยง", "เที่ยง", "thiang");
  b += numLine("1 PM", "บ่าย", "บ่ายโมง", "bai mong");
  b += numLine("3 PM", "บ่าย", "บ่ายสามโมง", "bai saam mong · bai = afternoon");
  b += numLine("5 PM", "เย็น", "ห้าโมงเย็น", "haa mong yen");
  b += numLine("6 PM", "เย็น", "หกโมงเย็น", "hok mong yen · yen = evening");
  b += numLine("7 PM", "ทุ่ม", "หนึ่งทุ่ม", "neung thum · night restarts at 1!");
  b += numLine("9 PM", "ทุ่ม", "สามทุ่ม", "saam thum · classic bar-meetup time");
  b += numLine("11 PM", "ทุ่ม", "ห้าทุ่ม", "haa thum");
  b += numLine("Midnight", "เที่ยงคืน", "เที่ยงคืน", "thiang kheun");
  b += numLine("Half past", "ครึ่ง", "...ครึ่ง", "khreung · 9:30 AM = gao mong khreung");
  b += numLine("Minutes", "นาที", "นาที", "naa-thee · 9:15 = gao mong sip-haa naa-thee");
  h += nbox(b);
  h += '<div class="lsub">Escape hatch: official 24-hour time uses naliga (นาฬิกา) — airports, train tickets, TV. 15:00 = sip-haa naliga. When the 6-hour clock melts your brain, naliga always works.</div>';
  return h;
}

function refWild() {
  let h = "", b = "";
  h += lsec("Numbers in the wild", "How digits actually show up on streets, boarding passes, and hotel doors.");
  b = "";
  b += numLine("Soi 11", "ซอย", "ซอยสิบเอ็ด", "soi sip-et · soi = side street off a main road");
  b += numLine("Street", "ถนน", "ถนนสุขุมวิท", "thanon = road · Thanon Sukhumvit");
  b += numLine("12/4", "ทับ", "สิบสองทับสี่", "sip-saawng THAP sii · thap = the address slash");
  b += numLine("Gate 42", "ประตู", "ประตูสี่สิบสอง", "pratuu sii-sip-saawng · or just say 'gate'");
  b += numLine("TG 315", "เที่ยวบิน", "สาม-หนึ่ง-ห้า", "flight numbers go digit by digit: saam-neung-haa");
  b += numLine("Bus 511", "รถเมล์", "ห้าร้อยสิบเอ็ด", "rot me haa-roi-sip-et · buses read as full numbers");
  b += numLine("Floor 3", "ชั้น", "ชั้นสาม", "chan saam · chan = floor/level");
  b += numLine("Room 214", "ห้อง", "สอง-หนึ่ง-สี่", "hong = room · usually digit by digit");
  b += numLine("Phone #", "เบอร์", "เบอร์โทร", "ber toh · always digit by digit, 0 = suun");

function numbersReference() {
  return refCore() + refThousands() + refFullRun() + refBaht() + refTime() + refWild();
}

function renderScenario(key) {
  const s = SCENARIOS[key];
  const parts = s.name.split(" ");
  $("listTitle").innerHTML = parts[0] + " <span>" + parts.slice(1).join(" ") + "</span>";
  let h = '<div class="lsub" style="margin-top:6px">' + s.intro + '</div>';
  s.parts.forEach(p => {
    h += lsec(p.title, "");
    p.lines.forEach(l => {
      h += '<div class="bub ' + (l.who === "you" ? "you" : "them") + '">' +
           '<div class="b-who">' + (l.who === "you" ? "🧍 You" : "🧑‍🍳 Barista") + '</div>' +
           '<div class="b-script thai">' + l.script + '</div>' +
           '<div class="b-roman">' + l.roman + '</div>' +
           '<div class="b-phon">🔊 ' + l.phon + '</div>' +
           '<div class="b-en">' + l.en + '</div>' +
           (l.words ? '<div class="b-words">🧩 ' + l.words + '</div>' : '') +
           '</div>';
    });
  });
  if (s.outro) h += lsec("Practice", "") + '<div class="lsub">' + s.outro + '</div>';
  $("listContent").innerHTML = h;
  listReturn = "home";
  showListScreen();
}

let listReturn = "study"; // where the list back-button goes

function showListScreen() {
  $("home").style.display = "none";
  $("study").style.display = "none";
  $("list").style.display = "block";
  $("list").scrollTop = 0;
}

const rowFor = c =>
  '<div class="lrow"><div class="l-script thai">' + c.script + '</div>' +
  '<div class="l-roman">' + c.roman + '</div>' +
  '<div class="l-phon">🔊 ' + c.phon + '</div>' +
  '<div class="l-en">' + c.en + '</div>' +
  (c.words ? '<div class="l-words">🧩 ' + c.words + '</div>' : '') +
  (c.note ? '<div class="l-note">' + c.note + '</div>' : '') + '</div>';

function renderListView() {
  const catName = currentCat === "all" ? "Complete Phrasebook" : CATEGORIES[currentCat].name;
  const parts = catName.split(" ");
  $("listTitle").innerHTML = parts[0] + " <span>" + parts.slice(1).join(" ") + "</span>";
  let h;
  if (currentCat === "all") {
    // The whole book, chapter by chapter. Cards appear in every chapter they
    // belong to — the repetition IS the curriculum.
    h = '<div class="lsub" style="margin-top:6px">Every chapter, front to back. Cards repeat across chapters on purpose — meeting "mai phet" in Market, Restaurant AND Basics is how it sticks.</div>';
    Object.entries(CATEGORIES).forEach(([key, cat]) => {
      const cards = cardsFor(key);
      h += lsec(cat.emoji + " " + cat.name, cards.length + " cards");
      cards.forEach(c => { h += rowFor(c); });
    });
  } else {
    const cards = cardsFor(currentCat);
    h = '<div class="lsub" style="margin-top:6px">' + cards.length +
        ' cards — read top to bottom, then go flip them.</div>';
    cards.forEach(c => { h += rowFor(c); });
    if (currentCat === "numbers") h += numbersReference();
  }
  $("listContent").innerHTML = h;
  showListScreen();
}

function openList() {                 // from inside a study session (☰)
  listReturn = "study";
  renderListView();
}
function openListFromHome(catKey) {   // from the Phrasebook section on home
  currentCat = catKey;
  listReturn = "home";
  renderListView();
}
function renderRef(refKey) {          // from the Reference lists section on home
  const r = REFS[refKey];
  const parts = r.name.split(" ");
  $("listTitle").innerHTML = parts[0] + " <span>" + parts.slice(1).join(" ") + "</span>";
  $("listContent").innerHTML = r.fn();
  listReturn = "home";
  showListScreen();
}

$("listBtn").addEventListener("click", openList);
$("listBackBtn").addEventListener("click", () => {
  $("list").style.display = "none";
  if (listReturn === "home") {
    $("home").style.display = "block";
    renderHome();
  } else {
    $("study").style.display = "flex";
  }
});

/* ---------------- events ---------------- */
card.addEventListener("click", () => card.classList.toggle("flipped"));

$("gotBtn").addEventListener("click", () => {
  if (!queue.length) return;
  const c = queue.shift();
  learnedSet.add(c.id);
  saveLearned();
  updateProgress();
  queue.length ? showCurrent() : finishDeck();
});

$("againBtn").addEventListener("click", () => {
  if (queue.length < 2) { showCurrent(); return; }
  queue.push(queue.shift());
  showCurrent();
});

$("shuffleBtn").addEventListener("click", () => { shuffle(queue); showCurrent(); });
$("dirBtn").addEventListener("click", () => { reversed = !reversed; showCurrent(); });
$("restartBtn").addEventListener("click", () => startSession(true));
$("backBtn").addEventListener("click", () => {
  $("study").style.display = "none";
  $("home").style.display = "block";
  renderHome();
});
$("allTile").addEventListener("click", () => openDeck("all"));

loadLearned();
renderHome();
